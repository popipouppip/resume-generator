<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Заполни данные — ResumeAI</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .form-hero {
      text-align: center;
      padding: 48px 24px 0;
    }
    .form-hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1e1e2e;
      color: #818cf8;
      border: 1px solid #2d2d3d;
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
    }
    .form-steps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 40px;
    }
    .form-step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #3d3d52;
      font-weight: 500;
    }
    .form-step.active { color: #818cf8; }
    .form-step.done   { color: #34d399; }
    .step-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #1e1e2e;
      color: #3d3d52;
      font-size: 12px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .form-step.active .step-dot { background: #6366f1; color: white; }
    .form-step.done   .step-dot { background: #34d399; color: white; }
    .step-line { width: 40px; height: 1px; background: #222228; margin: 0 4px; }

    .form-card {
      background: #17171f;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 24px 24px 8px;
      margin-bottom: 16px;
    }
    .form-card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #6b6b85;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-card-title span { font-size: 16px; }
    .form-submit-area {
      padding: 8px 0 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .form-submit-area .btn {
      width: 100%;
      max-width: 400px;
      text-align: center;
      padding: 16px 28px;
      font-size: 16px;
    }
    .form-submit-note {
      font-size: 13px;
      color: #3d3d52;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">ResumeAI</a>
  </header>

  <!-- Шапка формы -->
  <div class="form-hero">
    <div class="form-hero-badge">
      <span>✦</span> Шаг 1 из 2 — Основные данные
    </div>
    <div class="form-steps">
      <div class="form-step active">
        <div class="step-dot">1</div>
        Данные
      </div>
      <div class="step-line"></div>
      <div class="form-step">
        <div class="step-dot">2</div>
        Интервью
      </div>
      <div class="step-line"></div>
      <div class="form-step">
        <div class="step-dot">3</div>
        Резюме
      </div>
    </div>
  </div>

  <main class="form-page">
    <div class="form-container">

      <form id="resumeForm">

        <!-- Личные данные -->
        <div class="form-card">
          <div class="form-card-title"><span>👤</span> Личные данные</div>
          <div class="row">
            <div class="field">
              <label>Имя и фамилия</label>
              <input type="text" id="name" placeholder="Иван Иванов" required>
            </div>
            <div class="field">
              <label>Желаемая должность</label>
              <input type="text" id="position" placeholder="Frontend-разработчик" required>
            </div>
          </div>
          <div class="row">
            <div class="field">
              <label>Email</label>
              <input type="email" id="email" placeholder="ivan@email.com" required>
            </div>
            <div class="field">
              <label>Телефон</label>
              <input type="text" id="phone" placeholder="+7 999 123 45 67">
            </div>
          </div>
          <div class="field">
            <label>Город</label>
            <input type="text" id="city" placeholder="Москва">
          </div>
        </div>

        <!-- Опыт работы -->
        <div class="form-card">
          <div class="form-card-title"><span>💼</span> Опыт работы</div>
          <div class="field">
            <label>Компания и должность</label>
            <input type="text" id="company" placeholder="ООО Ромашка — Менеджер по продажам">
          </div>
          <div class="field">
            <label>Период работы</label>
            <input type="text" id="period" placeholder="2022 — 2024">
          </div>
          <div class="field">
            <label>Что ты делал на этой работе</label>
            <textarea id="duties" rows="4" placeholder="Вёл переговоры с клиентами, увеличил продажи на 30%, управлял командой из 5 человек..."></textarea>
          </div>
        </div>

        <!-- Образование -->
        <div class="form-card">
          <div class="form-card-title"><span>🎓</span> Образование</div>
          <div class="field">
            <label>Учебное заведение и специальность</label>
            <input type="text" id="education" placeholder="МГУ — Экономика, 2022">
          </div>
        </div>

        <!-- Навыки -->
        <div class="form-card">
          <div class="form-card-title"><span>⚡</span> Навыки</div>
          <div class="field">
            <label>Перечисли свои навыки через запятую</label>
            <input type="text" id="skills" placeholder="Excel, переговоры, работа в команде, английский B2">
          </div>
        </div>

        <!-- О себе -->
        <div class="form-card">
          <div class="form-card-title"><span>💬</span> О себе</div>
          <div class="field">
            <label>Пару слов о себе (необязательно)</label>
            <textarea id="about" rows="3" placeholder="Ответственный, быстро обучаюсь, люблю решать сложные задачи..."></textarea>
          </div>
        </div>

        <div class="form-submit-area">
          <button type="submit" class="btn" id="generateBtn">
            Перейти к интервью →
          </button>
          <p class="form-submit-note">Далее AI задаст тебе пару вопросов и напишет резюме</p>
        </div>

      </form>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
