<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Твоё резюме — ResumeAI</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

  <header>
    <a href="index.html" class="logo">ResumeAI</a>
    <button class="btn" id="downloadBtn">Скачать PDF</button>
  </header>

  <main class="result-page">
    <div class="resume-box" id="resumeOutput"></div>
    <a href="form.html" class="edit-link">← Изменить данные</a>
  </main>

  <script>
    const raw = localStorage.getItem('resumeText');
    const output = document.getElementById('resumeOutput');

    if (!raw) {
      output.innerHTML = '<p style="color:#888">Резюме не найдено. <a href="form.html" style="color:#6366f1">Вернись и заполни форму.</a></p>';
    } else {
      // Разбиваем текст на секции и красиво оформляем
      const lines = raw.split('\n').filter(l => l.trim() !== '');
      let html = '';

      lines.forEach(line => {
        const trimmed = line.trim();

        if (trimmed.startsWith('ИМЯ:')) {
          html += `<div class="r-name">${trimmed.replace('ИМЯ:', '').trim()}</div>`;
        } else if (trimmed.startsWith('ДОЛЖНОСТЬ:')) {
          html += `<div class="r-position">${trimmed.replace('ДОЛЖНОСТЬ:', '').trim()}</div>`;
        } else if (trimmed.startsWith('КОНТАКТЫ:')) {
          html += `<div class="r-contacts">${trimmed.replace('КОНТАКТЫ:', '').trim()}</div>`;
        } else if (['О СЕБЕ:', 'ОПЫТ РАБОТЫ:', 'ОБРАЗОВАНИЕ:', 'НАВЫКИ:'].includes(trimmed)) {
          html += `<div class="r-section-title">${trimmed.replace(':', '')}</div>`;
        } else {
          html += `<div class="r-line">${trimmed}</div>`;
        }
      });

      output.innerHTML = html;
    }

    document.getElementById('downloadBtn').addEventListener('click', function () {
      html2pdf().set({
        margin: 15,
        filename: 'resume.pdf',
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      }).from(output).save();
    });
  </script>

</body>
</html>
