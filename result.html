<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Твоё резюме — ResumeAI</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

  <header>
    <a href="index.html" class="logo">ResumeAI</a>
    <button class="btn" id="downloadBtn">Скачать PDF</button>
  </header>

  <main class="result-page">
    <div class="cv-wrap" id="cvOutput">
      <!-- Резюме рендерится сюда -->
    </div>
    <a href="form.html" class="edit-link">← Изменить данные</a>
  </main>

  <script>
    const raw = localStorage.getItem('resumeData');
    const wrap = document.getElementById('cvOutput');

    if (!raw) {
      wrap.innerHTML = '<p style="padding:40px;color:#6e6e73">Резюме не найдено. <a href="form.html" style="color:#0071e3">Вернись и заполни форму.</a></p>';
    } else {
      const d = JSON.parse(raw);

      const skillsHtml = (d.skills || []).map(s =>
        `<span class="cv-skill">${s}</span>`
      ).join('');

      const achievementsHtml = (d.experience || []).map(exp => {
        const bullets = (exp.achievements || []).map(a =>
          `<li>${a}</li>`
        ).join('');
        return `
          <div class="cv-job">
            <div class="cv-job-header">
              <div>
                <div class="cv-job-role">${exp.role || ''}</div>
                <div class="cv-job-company">${exp.company || ''}</div>
              </div>
              <div class="cv-job-period">${exp.period || ''}</div>
            </div>
            <ul class="cv-bullets">${bullets}</ul>
          </div>
        `;
      }).join('');

      wrap.innerHTML = `
        <div class="cv-card">

          <!-- ЛЕВАЯ КОЛОНКА -->
          <div class="cv-left">
            <div class="cv-avatar">${(d.name || 'A')[0].toUpperCase()}</div>
            <div class="cv-left-name">${d.name || ''}</div>
            <div class="cv-left-pos">${d.position || ''}</div>

            <div class="cv-left-section">Контакты</div>
            <div class="cv-contact-item">
              <span class="cv-contact-icon">✉</span>${d.email || ''}
            </div>
            <div class="cv-contact-item">
              <span class="cv-contact-icon">☎</span>${d.phone || ''}
            </div>
            <div class="cv-contact-item">
              <span class="cv-contact-icon">◎</span>${d.city || ''}
            </div>

            <div class="cv-left-section">Навыки</div>
            <div class="cv-skills-list">${skillsHtml}</div>

            <div class="cv-left-section">Образование</div>
            <div class="cv-edu-text">${d.education || ''}</div>
          </div>

          <!-- ПРАВАЯ КОЛОНКА -->
          <div class="cv-right">
            <div class="cv-right-section">Профессиональный профиль</div>
            <p class="cv-summary">${d.summary || ''}</p>

            <div class="cv-right-section">Опыт работы</div>
            ${achievementsHtml}
          </div>

        </div>
      `;
    }

    document.getElementById('downloadBtn').addEventListener('click', function () {
      const el = document.getElementById('cvOutput');
      html2pdf().set({
        margin: 0,
        filename: 'resume.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      }).from(el).save();
    });
  </script>

</body>
</html>
