<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResumeAI — создай резюме за 2 минуты</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">ResumeAI</div>
    <a href="form.html" class="btn">Начать</a>
  </header>

  <main>
    <div class="hero-split">

      <!-- Текст -->
      <div class="hero-text">
        <div class="badge">На основе искусственного интеллекта</div>
        <h1>Резюме которое<br><span class="highlight">получает ответы</span></h1>
        <p class="subtitle">Заполни форму за 2 минуты — AI напишет профессиональное резюме и подстроит его под вакансию</p>
        <a href="form.html" class="btn">Создать резюме бесплатно →</a>
        <div class="stats">
          <div class="stat"><strong>2 мин</strong><span>на заполнение</span></div>
          <div class="divider"></div>
          <div class="stat"><strong>AI</strong><span>пишет за тебя</span></div>
          <div class="divider"></div>
          <div class="stat"><strong>PDF</strong><span>готов сразу</span></div>
        </div>
      </div>

      <!-- Персонаж: фиолетовый фрукт с факелом -->
      <div class="grape-char">
        <div class="grape-torch">
          <div class="grape-torch-flame"></div>
          <div class="grape-torch-stick"></div>
        </div>
        <div class="grape-arm-r"></div>
        <div class="grape-body">
          <div class="grape-shine"></div>
          <div class="grape-eye grape-eye-l"><div class="grape-pupil"></div></div>
          <div class="grape-eye grape-eye-r"><div class="grape-pupil"></div></div>
          <div class="grape-smile"></div>
          <div class="grape-cheek grape-cheek-l"></div>
          <div class="grape-cheek grape-cheek-r"></div>
        </div>
        <div class="grape-arm-l"></div>
        <div class="grape-legs">
          <div class="grape-leg grape-leg-l"></div>
          <div class="grape-leg grape-leg-r"></div>
        </div>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
