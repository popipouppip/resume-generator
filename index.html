<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResumeAI — создай резюме за 2 минуты</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">

  <!-- Факелы -->
  <div class="dtorch dtorch-left"><div class="dtorch-glow"></div><img src="photo/pixel-old-torch.png" class="dtorch-img"></div>
  <div class="dtorch dtorch-right"><div class="dtorch-glow"></div><img src="photo/pixel-old-torch.png" class="dtorch-img"></div>
  <!-- Плющ -->
  <div class="ivy ivy-tl"><img src="photo/pixel-old-thick-blackthorn.png"></div>
  <div class="ivy ivy-tr"><img src="photo/pixel-old-thick-blackthorn.png"></div>
  <div class="ivy ivy-bl"><img src="photo/pixel-old-thick-blackthorn.png"></div>
  <div class="ivy ivy-br"><img src="photo/pixel-old-thick-blackthorn.png"></div>
  <!-- Монеты и кинжалы -->
  <div class="coin coin-1"></div>
  <div class="coin coin-2"></div>
  <div class="coin coin-3"></div>
  <div class="dagger dagger-1">🗡</div>
  <div class="dagger dagger-2">🗡</div>

  <header>
    <div class="logo">ResumeAI</div>
    <a href="form.html" class="btn">Начать</a>
  </header>

  <main>
    <div class="hero">
      <div class="badge">На основе искусственного интеллекта</div>
      <h1>Резюме которое<br><span class="highlight">получает ответы</span></h1>
      <p class="subtitle">Заполни форму за 2 минуты — AI напишет профессиональное резюме и подстроит его под вакансию</p>
      <a href="form.html" class="btn">Создать резюме бесплатно →</a>
      <div class="stats">
        <div class="stat"><strong>2 мин</strong><span>на заполнение</span></div>
        <div class="divider"></div>
        <div class="stat"><strong>AI</strong><span>пишет за тебя</span></div>
        <div class="divider"></div>
        <div class="stat"><strong>PDF</strong><span>готов сразу</span></div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
