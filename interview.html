<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Интервью — ResumeAI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="interview-header">
    <a href="index.html" class="logo">ResumeAI</a>
    <div class="xp-wrap">
      <div class="xp-label" id="xpLabel">Вопрос 1</div>
      <div class="xp-track">
        <div class="xp-fill" id="xpFill" style="width:0%"></div>
      </div>
    </div>
  </header>

  <main class="interview-page">
    <div class="interview-container">
      <div class="interview-chat" id="chatWindow"></div>
      <div class="interview-input-area" id="inputArea" style="display:none">
        <textarea class="interview-input" id="userInput" placeholder="Введи ответ..." rows="1"></textarea>
        <button class="interview-send-btn" id="sendBtn">→</button>
      </div>
    </div>
  </main>

  <script>
    const formData = JSON.parse(localStorage.getItem('formData') || '{}');
    const firstName = (formData.name || 'друг').split(' ')[0];
    const position  = formData.position || '';

    const baseQuestions = [
      `Привет, ${firstName}! Я помогу написать резюме, которое выделит тебя среди других.\n\nРасскажи — какое твоё главное профессиональное достижение? То, чем гордишься больше всего.`,
      'Что тебе больше всего нравится в своей работе? Что по-настоящему заряжает?',
      'В чём ты лучше других в своей области? Что выделяет тебя среди коллег?',
      'Какая у тебя цель на ближайшие 2–3 года? Куда хочешь двигаться?',
    ];
    const finalQuestion = 'Последний вопрос — есть что-то важное о себе, что хочешь добавить в резюме?';

    let specificQuestions = null;
    let answers  = [];
    let currentQ = 0;
    let totalQ   = baseQuestions.length + 3;
    let busy     = false;

    const chatWindow = document.getElementById('chatWindow');
    const inputArea  = document.getElementById('inputArea');
    const userInput  = document.getElementById('userInput');
    const sendBtn    = document.getElementById('sendBtn');
    const xpFill     = document.getElementById('xpFill');
    const xpLabel    = document.getElementById('xpLabel');

    function updateXP() {
      const total = getTotalQuestions();
      const pct = Math.min((currentQ / total) * 100, 95);
      xpFill.style.width = pct + '%';
      xpLabel.textContent = 'Вопрос ' + (currentQ + 1) + ' из ' + total;
    }

    function scrollToBottom() {
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function addUserMessage(text) {
      const msg = document.createElement('div');
      msg.className = 'chat-msg user';
      msg.textContent = text;
      chatWindow.appendChild(msg);
      scrollToBottom();
    }

    function addBotMessage(text) {
      return new Promise(resolve => {
        const wrap = document.createElement('div');
        wrap.className = 'chat-bot-wrap';
        wrap.innerHTML = `<div class="chat-avatar">AI</div><div class="chat-msg bot typing"><span></span><span></span><span></span></div>`;
        chatWindow.appendChild(wrap);
        scrollToBottom();

        setTimeout(() => {
          wrap.remove();
          const w2 = document.createElement('div');
          w2.className = 'chat-bot-wrap';
          w2.style.opacity = '0';
          w2.style.transform = 'translateY(8px)';
          w2.innerHTML = `<div class="chat-avatar">AI</div><div class="chat-msg bot">${text.replace(/\n/g, '<br>')}</div>`;
          chatWindow.appendChild(w2);
          scrollToBottom();
          requestAnimationFrame(() => {
            w2.style.transition = 'opacity 0.3s, transform 0.3s';
            w2.style.opacity = '1';
            w2.style.transform = 'translateY(0)';
          });
          resolve();
        }, 1200);
      });
    }

    function showInput() { inputArea.style.display = 'flex'; userInput.focus(); }
    function hideInput() { inputArea.style.display = 'none'; }

    async function loadSpecificQuestions() {
      await addBotMessage('Секунду... подбираю вопросы специально для твоей профессии.');
      try {
        const res  = await fetch('/api/questions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ position }),
        });
        const data = await res.json();
        return Array.isArray(data.questions) ? data.questions : [];
      } catch {
        return [];
      }
    }

    async function generateResume() {
      xpFill.style.width = '100%';
      xpLabel.textContent = 'Готово!';
      await addBotMessage('Отлично! Создаю твоё резюме...');

      const spec = specificQuestions || [];
      const payload = {
        ...formData,
        interview: {
          achievement: answers[0] || '',
          enjoys:      answers[1] || '',
          strength:    answers[2] || '',
          goal:        answers[3] || '',
          specific1_q: spec[0] || '',
          specific1_a: answers[4] || '',
          specific2_q: spec[1] || '',
          specific2_a: answers[5] || '',
          extra:       answers[answers.length - 1] || '',
        }
      };

      try {
        const res    = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const result = await res.json();

        if (result.resume) {
          localStorage.setItem('resumeData', JSON.stringify(result.resume));
          await addBotMessage('Готово! Переходим к твоему резюме...');
          setTimeout(() => { window.location.href = 'result.html'; }, 1200);
        } else {
          setTimeout(() => { window.location.href = 'error.html'; }, 800);
        }
      } catch {
        setTimeout(() => { window.location.href = 'error.html'; }, 800);
      }
    }

    function getQuestion(index) {
      if (index < baseQuestions.length) return baseQuestions[index];
      const spec = specificQuestions || [];
      const extra = index - baseQuestions.length;
      if (extra < spec.length) return spec[extra];
      return finalQuestion;
    }

    function getTotalQuestions() {
      return baseQuestions.length + (specificQuestions || []).length + 1;
    }

    async function handleAnswer() {
      const text = userInput.value.trim();
      if (!text || busy) return;
      busy = true;

      hideInput();
      userInput.value = '';
      userInput.style.height = 'auto';
      addUserMessage(text);
      answers.push(text);
      currentQ++;

      if (currentQ === baseQuestions.length && specificQuestions === null) {
        specificQuestions = await loadSpecificQuestions();
        totalQ = getTotalQuestions();
      }

      updateXP();

      if (currentQ < getTotalQuestions()) {
        await addBotMessage(getQuestion(currentQ));
        showInput();
        busy = false;
      } else {
        await generateResume();
      }
    }

    sendBtn.addEventListener('click', handleAnswer);
    userInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAnswer(); }
    });
    userInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    async function init() {
      updateXP();
      await addBotMessage(baseQuestions[0]);
      showInput();
    }

    init();
  </script>

</body>
</html>
