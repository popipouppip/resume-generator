<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Интервью — ResumeAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-body dark">

  <!-- Факел слева -->
  <div class="dtorch dtorch-left">
    <div class="dtorch-glow"></div>
    <div class="dtorch-fire"></div>
    <div class="dtorch-handle"></div>
    <div class="dtorch-mount"></div>
  </div>

  <!-- Факел справа -->
  <div class="dtorch dtorch-right">
    <div class="dtorch-glow"></div>
    <div class="dtorch-fire"></div>
    <div class="dtorch-handle"></div>
    <div class="dtorch-mount"></div>
  </div>

  <!-- Плющ по углам -->
  <div class="ivy ivy-tl">🌿</div>
  <div class="ivy ivy-tr">🌿</div>
  <div class="ivy ivy-bl">🌿</div>
  <div class="ivy ivy-br">🌿</div>

  <!-- Золотые монеты -->
  <div class="coin coin-1"></div>
  <div class="coin coin-2"></div>
  <div class="coin coin-3"></div>

  <!-- Кинжалы -->
  <div class="dagger dagger-1">🗡</div>
  <div class="dagger dagger-2">🗡</div>

  <!-- Уведомление-достижение -->
  <div class="achievement" id="achievement">⚔ Особые вопросы разблокированы!</div>

  <header class="game-header">
    <a href="index.html" class="logo game-logo">⚔ ResumeAI</a>
    <div class="xp-wrap">
      <div class="xp-label" id="xpLabel">Вопрос I</div>
      <div class="xp-track">
        <div class="xp-fill" id="xpFill" style="width:0%"></div>
      </div>
    </div>
  </header>

  <main class="game-page">
    <div class="game-container">
      <div class="game-chat" id="chatWindow"></div>
      <div class="game-input-area" id="inputArea" style="display:none">
        <textarea class="game-input" id="userInput" placeholder="Введи ответ..." rows="1"></textarea>
        <button class="game-send-btn" id="sendBtn">⚡</button>
      </div>
    </div>
  </main>

  <script>
    const formData = JSON.parse(localStorage.getItem('formData') || '{}');
    const firstName = (formData.name || 'странник').split(' ')[0];
    const position  = formData.position || '';

    const romans = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];

    const baseQuestions = [
      `Приветствую тебя, ${firstName}! Я помогу написать резюме, которое выделит тебя среди других 🔥\n\nРасскажи — какое твоё главное профессиональное достижение? То, чем гордишься больше всего.`,
      'Что тебе больше всего нравится в своей работе? Что по-настоящему заряжает?',
      'В чём ты лучше других в своей области? Что выделяет тебя среди коллег?',
      'Какая у тебя цель на ближайшие 2–3 года? Куда хочешь двигаться?',
    ];
    const finalQuestion = 'Последнее испытание! ⚡ Есть что-то важное о себе, что хочешь добавить в резюме?';

    let specificQuestions = null;
    let answers  = [];
    let currentQ = 0;
    let totalQ   = baseQuestions.length + 3;
    let busy     = false;

    const chatWindow = document.getElementById('chatWindow');
    const inputArea  = document.getElementById('inputArea');
    const userInput  = document.getElementById('userInput');
    const sendBtn    = document.getElementById('sendBtn');
    const xpFill     = document.getElementById('xpFill');
    const xpLabel    = document.getElementById('xpLabel');

    function updateXP() {
      const pct = Math.min((currentQ / totalQ) * 100, 95);
      xpFill.style.width = pct + '%';
      xpLabel.textContent = 'Вопрос ' + (romans[currentQ] || (currentQ + 1));
    }

    function showAchievement() {
      const el = document.getElementById('achievement');
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3200);
    }

    function scrollToBottom() {
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function addUserMessage(text) {
      const msg = document.createElement('div');
      msg.className = 'game-msg user';
      msg.textContent = text;
      chatWindow.appendChild(msg);
      scrollToBottom();
    }

    function addBotMessage(text) {
      return new Promise(resolve => {
        const wrap = document.createElement('div');
        wrap.className = 'game-bot-wrap';
        wrap.innerHTML = `<div class="game-avatar">✦</div><div class="game-msg bot typing"><span></span><span></span><span></span></div>`;
        chatWindow.appendChild(wrap);
        scrollToBottom();

        setTimeout(() => {
          wrap.remove();
          const w2 = document.createElement('div');
          w2.className = 'game-bot-wrap';
          w2.style.opacity = '0';
          w2.style.transform = 'translateY(8px)';
          w2.innerHTML = `<div class="game-avatar">✦</div><div class="game-msg bot">${text.replace(/\n/g, '<br>')}</div>`;
          chatWindow.appendChild(w2);
          scrollToBottom();
          requestAnimationFrame(() => {
            w2.style.transition = 'opacity 0.3s, transform 0.3s';
            w2.style.opacity = '1';
            w2.style.transform = 'translateY(0)';
          });
          resolve();
        }, 1200);
      });
    }

    function showInput() { inputArea.style.display = 'flex'; userInput.focus(); }
    function hideInput() { inputArea.style.display = 'none'; }

    async function loadSpecificQuestions() {
      await addBotMessage('Секунду... подбираю особые вопросы специально для тебя 🎲');
      try {
        const res  = await fetch('/api/questions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ position }),
        });
        const data = await res.json();
        return Array.isArray(data.questions) ? data.questions : [];
      } catch {
        return [];
      }
    }

    async function generateResume() {
      xpFill.style.width = '100%';
      xpLabel.textContent = 'Готово!';
      await addBotMessage('Квест завершён! Создаю твоё резюме... ✨');

      const spec = specificQuestions || [];
      const payload = {
        ...formData,
        interview: {
          achievement: answers[0] || '',
          enjoys:      answers[1] || '',
          strength:    answers[2] || '',
          goal:        answers[3] || '',
          specific1_q: spec[0] || '',
          specific1_a: answers[4] || '',
          specific2_q: spec[1] || '',
          specific2_a: answers[5] || '',
          extra:       answers[answers.length - 1] || '',
        }
      };

      try {
        const res    = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const result = await res.json();

        if (result.resume) {
          localStorage.setItem('resumeData', JSON.stringify(result.resume));
          await addBotMessage('Готово! 🎉 Переходим к твоему резюме...');
          setTimeout(() => { window.location.href = 'result.html'; }, 1200);
        } else {
          await addBotMessage('Что-то пошло не так. <a href="form.html" style="color:#d97706">Попробуй снова</a>.');
          busy = false;
        }
      } catch {
        await addBotMessage('Ошибка соединения. <a href="form.html" style="color:#d97706">Попробуй снова</a>.');
        busy = false;
      }
    }

    function getQuestion(index) {
      if (index < baseQuestions.length) return baseQuestions[index];
      const spec = specificQuestions || [];
      const extra = index - baseQuestions.length;
      if (extra < spec.length) return spec[extra];
      return finalQuestion;
    }

    function getTotalQuestions() {
      return baseQuestions.length + (specificQuestions || []).length + 1;
    }

    async function handleAnswer() {
      const text = userInput.value.trim();
      if (!text || busy) return;
      busy = true;

      hideInput();
      userInput.value = '';
      userInput.style.height = 'auto';
      addUserMessage(text);
      answers.push(text);
      currentQ++;

      // После 4-го ответа — загружаем спецвопросы
      if (currentQ === baseQuestions.length && specificQuestions === null) {
        specificQuestions = await loadSpecificQuestions();
        totalQ = getTotalQuestions();
        if (specificQuestions.length > 0) showAchievement();
      }

      updateXP();

      if (currentQ < getTotalQuestions()) {
        await addBotMessage(getQuestion(currentQ));
        showInput();
        busy = false;
      } else {
        await generateResume();
      }
    }

    sendBtn.addEventListener('click', handleAnswer);
    userInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAnswer(); }
    });
    userInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    async function init() {
      updateXP();
      await addBotMessage(baseQuestions[0]);
      showInput();
    }

    init();
  </script>

</body>
</html>
